#
# Kernel & System (内核与系统基础)
#
# 定义系统时钟滴答的频率
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
# 详细注释：v4.4.0 推荐使用 picolibc 以获得更小的 Flash 占用
CONFIG_PICOLIBC=y
# LVGL初始化或文件系统操作会复用main stack，因此需要增加 main stack size
CONFIG_MAIN_STACK_SIZE=4096
# 开启 Zephyr 的输入子系统
CONFIG_INPUT=y

#
# ==========================================================
# 第一部分：Console (控制台) - 解决“信息从哪发出来”
# ==========================================================
# 启用控制台基础功能
CONFIG_CONSOLE=y

# 【关键点】必须为 y！
# 它是内核启动早期（Shell还没启动时）打印 Zephyr 版本信息的唯一通道。
# 如果设为 n，你将看不到 "*** Booting Zephyr OS ***" 这一行。
CONFIG_UART_CONSOLE=y

# 允许 printk 函数将信息发送到控制台
CONFIG_STDOUT_CONSOLE=y

# ==========================================================
# 第二部分：Logging (日志) - 解决“系统发生了什么”
# ==========================================================
# 启用日志系统
CONFIG_LOG=y

# 设置日志的显示模式
# 由于我们要用 Shell 来显示日志，所以禁用掉原始的 UART 直接输出模式，
# 防止日志和 Shell 的字符在屏幕上打架（乱码）。
CONFIG_LOG_BACKEND_UART=n

# 允许 printk 输出的信息也被当作日志处理
CONFIG_LOG_PRINTK=y

# 日志级别设置（4 是最高级别 INFO，能看到大部分信息）
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_DEFAULT_LEVEL=3

# ==========================================================
# 第三部分：Shell (外壳) - 解决“如何与开发板交互”
# ==========================================================
# 启用 Shell 功能
CONFIG_SHELL=y
CONFIG_SHELL_BACKENDS=y

# 启用串口作为 Shell 的后端（让你可以通过串口助手输入命令）
CONFIG_SHELL_BACKEND_SERIAL=y

# 启用 Shell 的日志后端
# 作用：让 Shell 接管 Log 系统的输出。
# 开启后，当系统产生日志时，Shell 会整齐地把它打印出来，
# 并且不会打断你正在输入的命令行（它会自动处理换行和光标）。
CONFIG_SHELL_LOG_BACKEND=y

# 设置 Shell 提示符，你在串口看到的就会是 my_board:~$
CONFIG_SHELL_PROMPT_UART="zephyr:~$ "

# 启用 HEX 文件输出，解决 west flash --runner openocd 的报错
CONFIG_BUILD_OUTPUT_HEX=y

#
# Core Drivers: Serial/UART (核心驱动：串行/UART)
#
# 启用串行子系统
CONFIG_SERIAL=y

# 启用浮点支持，以便在日志中打印浮点数
CONFIG_CBPRINTF_FP_SUPPORT=y

#
# 启用 SPI RAM 支持
# 
# 1. 开启外部 RAM 总支持
CONFIG_ESP_SPIRAM=y
# 2. 必须指定是八线(Octal)模式（16MB 型号通常是 Octal 1.8V）
CONFIG_SPIRAM_MODE_OCT=y
# 3. 设置速度（80MHz 是常见的安全选择，160MHz 可能不稳定）
CONFIG_SPIRAM_SPEED_80M=y
# 3. 设置容量 (16MB = 16777216 字节)
# CONFIG_ESP_SPIRAM_SIZE=16777216
# 4. 将 SPI RAM 用作系统内存的一部分（启用后，malloc 等函数可以使用 SPI RAM）
# CONFIG_ESP_SPIRAM_HEAP_SIZE=8388608
# 6. 可选：启动时进行内存测试，确保硬件连接没问题
# CONFIG_ESP_SPIRAM_MEMTEST=y

# 开启堆内存运行时状态统计功能（不开启的话，sys_heap_runtime_stats_get 会无法获取数据）
CONFIG_SYS_HEAP_RUNTIME_STATS=y

# 
# MCUboot 核心引导配置
# 
# 告诉 Zephyr 内核：当前应用程序是运行在 MCUboot 引导程序之上的
# 开启后，系统会自动处理好固件在 Flash 中的地址偏移（例如自动偏移到 0x20000）
# CONFIG_BOOTLOADER_MCUBOOT=y

# 
# 底层 Flash 驱动与存储支持（固件管理器的依赖项）
# 
# 开启物理 Flash 的底层驱动支持
CONFIG_FLASH=y
# 开启 Flash 的页布局（Page Layout）支持，以便系统能按块擦写 Flash
CONFIG_FLASH_PAGE_LAYOUT=y
# 开启流式 Flash 写入驱动（重要！用来彻底解决之前 STREAM_FLASH=n 导致的警告）
CONFIG_STREAM_FLASH=y
# 开启 Flash 地图映射管理，用于精准识别存储分区（Slot 0 / Slot 1）
CONFIG_FLASH_MAP=y

# 
# 固件管理器与 MCUboot 运行时联动
# 
# 开启应用层的固件镜像管理器（用于读取/验证固件的版本头信息）
CONFIG_IMG_MANAGER=y
# 开启专属于 MCUboot 的镜像管理实现（解决 choice 选项悬空以及 FOOTER_SIZE 警告）
CONFIG_MCUBOOT_IMG_MANAGER=y

# 
# 关闭保守的自动检测，榨干 32MB 八线 Flash 的极限性能
# 
# 关闭自动检测（省下 900 字节 IRAM，且解锁 DTR 限制）
CONFIG_ESPTOOLPY_FLASH_MODE_AUTO_DETECT=n
# 强制开启八线Octal Flash支持
CONFIG_ESPTOOLPY_OCT_FLASH=y
# 强制开启最高速的 DTR（双倍速率）采样模式
CONFIG_ESPTOOLPY_FLASH_SAMPLE_MODE_DTR=y
# 强制指定 Flash 大小为 32MB
CONFIG_ESPTOOLPY_FLASHSIZE_32MB=y

#
# Core Drivers: GPIO (通用输入/输出)
#
# 启用 GPIO 核心支持
CONFIG_GPIO=y

#
# Core Drivers: I2C
#
# 启用 I2C 核心支持
# CONFIG_I2C=y
# 开启软件模拟 I2C 驱动
# CONFIG_I2C_GPIO=y

#
# Core Drivers: Standard SPI
#
# 启用标准 SPI 核心支持 (如果需要连接 SPI 传感器/屏幕)
# CONFIG_SPI=y


#
# Core Drivers: RTC (实时时钟)
#
# 启用 RTC 核心支持
# CONFIG_RTC=y
# 启用 STM32 硬件 RTC 驱动
# CONFIG_RTC_STM32=y
# 启用 RTC 闹钟功能
# CONFIG_RTC_ALARM=y

#
# Core Drivers: LED (发光二极管)
#
# 启用 LED 核心驱动框架
# CONFIG_LED=y
CONFIG_LED_STRIP=y
# 开启 SPI 模式的 WS2812 驱动
# CONFIG_WS2812_STRIP_SPI=y
# 关键：开启 LED Strip 的详细调试日志
CONFIG_LED_STRIP_LOG_LEVEL_DBG=y

# 
# Core Drivers: Bluetooth (蓝牙)
#
# 启用蓝牙子系统
CONFIG_BT=y
# 启用安全管理协议
CONFIG_BT_SMP=y
# 配置为蓝牙广播角色
CONFIG_BT_BROADCASTER=y
# 配置为蓝牙外设角色
CONFIG_BT_PERIPHERAL=y
# 启用隐私功能
CONFIG_BT_PRIVACY=y

# 蓝牙设备名称
CONFIG_BT_DEVICE_NAME="ESP32S3_BLE"
# 允许动态修改名称
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
# 动态名称最大长度（设置为纯数字）
CONFIG_BT_DEVICE_NAME_MAX=64
# 设备外观（833代表心率计）
CONFIG_BT_DEVICE_APPEARANCE=833

# 基础 GATT 服务
CONFIG_BT_DIS=y
CONFIG_BT_BAS=y
CONFIG_BT_HRS=y
CONFIG_BT_IAS=y
CONFIG_BT_CTS=y
CONFIG_BT_CTS_HELPER_API=y

# 启用 Zephyr 的 NUS（Nordic UART Service）蓝牙服务
CONFIG_BT_ZEPHYR_NUS=y

# 将 Host 层的连接发送上下文数量从默认值改为 12
CONFIG_BT_CONN_TX_MAX=12
# 建议同时将 ACL 缓存数量也对齐
CONFIG_BT_BUF_ACL_TX_COUNT=12

# 系统配置
# 增加工作队列栈大小（设置为纯数字）
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Core dump 是在程序崩溃时保留的内存快照
# CONFIG_DEBUG_COREDUMP=y
# CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y

#
# ==========================================================
# LCD & LVGL (液晶显示屏 + 图形界面)
# ==========================================================
# 启用显示子系统
CONFIG_DISPLAY=y
# 启用 MIPI DBI 模式 C (SPI 模拟) — 自动被 ST7789V 驱动选中
# CONFIG_MIPI_DBI=y
# 显示驱动错误日志
CONFIG_DISPLAY_LOG_LEVEL_ERR=y

# 启用 LVGL 图形库
CONFIG_LVGL=y
# 颜色深度使用 16 位 RGB565 (匹配 ST7789V 硬件格式)
CONFIG_LV_COLOR_DEPTH_16=y
# 启用 LVGL 内部日志
CONFIG_LV_USE_LOG=y
# LVGL 内存池大小 (从系统堆分配，用于 LVGL 内部对象管理)
# 增大到 32KB 以满足多 Widget + 图像对象的内存需求
CONFIG_LV_Z_MEM_POOL_SIZE=32768
# ===== LVGL 渲染缓冲区 (性能关键) =====
# 渲染缓冲区 = 屏幕总像素的 100% (全帧缓冲)
# 240×280×2 字节 = 131KB 单缓冲, 262KB 双缓冲
# 放入 PSRAM (16MB) — 完全不占用宝贵的内部 SRAM
CONFIG_LV_Z_VDB_SIZE=100
# 双缓冲: LVGL 渲染到 buf0 的同时, SPI 从 buf1 刷屏
# 消除画面撕裂 (tearing), 是视觉流畅度的最大提升项
CONFIG_LV_Z_DOUBLE_VDB=y
# 缓冲区从静态数组分配 (编译时决定)
CONFIG_LV_Z_BUFFER_ALLOC_STATIC=y
# ★★★ 关键: 将渲染缓冲区放入 PSRAM ★★★
# ESP32-S3 default.ld 第 1049 行已内置: KEEP(*(.lvgl_buf*))
# 开启后 __attribute__((section(".lvgl_buf"))) → 链接器自动放入 ext_dram_seg
CONFIG_LV_Z_VDB_CUSTOM_SECTION=y
# ★★★ 关键: 将 LVGL 内存池放入 PSRAM ★★★
# ESP32-S3 default.ld 第 1051 行已内置: KEEP(*(.lvgl_heap*))
CONFIG_LV_Z_MEMORY_POOL_CUSTOM_SECTION=y
# 在应用启动前自动初始化 LVGL 库
CONFIG_LV_Z_AUTO_INIT=y

# ===== LVGL 独立渲染工作队列 (性能关键) =====
# 开启后 LVGL 在专用高优先级线程中运行 lv_timer_handler(),
# 应用线程不再需要手动调用, 且不会被低优先级任务阻塞
CONFIG_LV_Z_RUN_LVGL_ON_WORKQUEUE=y
# 工作队列优先级: 5 (高于大部分应用线程, 保证 UI 流畅)
CONFIG_LV_Z_LVGL_WORKQUEUE_PRIORITY=5
# 工作队列栈大小: 4096 (足够 LVGL 渲染使用)
CONFIG_LV_Z_LVGL_WORKQUEUE_STACK_SIZE=4096

# 启用 16 位颜色字节交换 (RGB565 格式)
# 【关键】ESP32 是小端序 (Little Endian)，而 ST7789 屏幕期望大端序 (Big Endian) 数据。
# 不开启此选项时：像素数据按 [高8位][低8位] 顺序发送，屏幕端解析颠倒 →
#                 现象：屏幕能显示图像，但颜色完全错误（红蓝颠倒、花屏、杂色）
# 开启此选项后：LVGL 在发送前自动交换每 2 字节的高低顺序 →
#                 发送 [低8位][高8位]，屏幕正确解析为 RGB565
# 总结：只要 SPI 屏颜色不对，第一个检查的就是这个选项！
CONFIG_LV_COLOR_16_SWAP=y

# ===== LVGL Widgets (按需启用，节约 Flash) =====
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_CANVAS=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_14=y

# ===== LVGL 性能基准测试 (Benchmark) =====
# 启用 LVGL 官方 demo 构建
CONFIG_LV_BUILD_DEMOS=y
# 性能测试: 渲染 FPS, CPU 占用, flush 耗时
# 自动拉取所需字体: Montserrat 14/20/24/26 + Widgets demo
CONFIG_LV_USE_DEMO_BENCHMARK=y
# 系统监控: 为 benchmark 提供真实 CPU 空闲率数据
# 如果不启用, benchmark 会回退到测量 lv_timer_handler 耗时来估算 CPU
CONFIG_LV_USE_SYSMON=y
# 性能监视器: 在屏幕角落显示 FPS/CPU 实时数据
CONFIG_LV_USE_PERF_MONITOR=y

# ===== 背光控制 PWM (使用 ESP32 LEDC) =====
CONFIG_PWM=y
