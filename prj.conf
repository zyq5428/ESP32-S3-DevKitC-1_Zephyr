#
# Kernel & System (内核与系统基础)
#
# 定义系统时钟滴答的频率
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
# 详细注释：v4.4.0 推荐使用 picolibc 以获得更小的 Flash 占用
CONFIG_PICOLIBC=y
# LVGL初始化或文件系统操作会复用main stack，因此需要增加 main stack size
CONFIG_MAIN_STACK_SIZE=4096
# 开启 Zephyr 的输入子系统
CONFIG_INPUT=y

#
# ==========================================================
# 第一部分：Console (控制台) - 解决“信息从哪发出来”
# ==========================================================
# 启用控制台基础功能
CONFIG_CONSOLE=y

# 【关键点】必须为 y！
# 它是内核启动早期（Shell还没启动时）打印 Zephyr 版本信息的唯一通道。
# 如果设为 n，你将看不到 "*** Booting Zephyr OS ***" 这一行。
CONFIG_UART_CONSOLE=y

# 允许 printk 函数将信息发送到控制台
CONFIG_STDOUT_CONSOLE=y

# ==========================================================
# 第二部分：Logging (日志) - 解决“系统发生了什么”
# ==========================================================
# 启用日志系统
CONFIG_LOG=y

# 设置日志的显示模式
# 由于我们要用 Shell 来显示日志，所以禁用掉原始的 UART 直接输出模式，
# 防止日志和 Shell 的字符在屏幕上打架（乱码）。
CONFIG_LOG_BACKEND_UART=n

# 允许 printk 输出的信息也被当作日志处理
CONFIG_LOG_PRINTK=y

# 日志级别设置（4 是最高级别 INFO，能看到大部分信息）
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_DEFAULT_LEVEL=3

# ==========================================================
# 第三部分：Shell (外壳) - 解决“如何与开发板交互”
# ==========================================================
# 启用 Shell 功能
CONFIG_SHELL=y
CONFIG_SHELL_BACKENDS=y

# 启用串口作为 Shell 的后端（让你可以通过串口助手输入命令）
CONFIG_SHELL_BACKEND_SERIAL=y

# 启用 Shell 的日志后端
# 作用：让 Shell 接管 Log 系统的输出。
# 开启后，当系统产生日志时，Shell 会整齐地把它打印出来，
# 并且不会打断你正在输入的命令行（它会自动处理换行和光标）。
CONFIG_SHELL_LOG_BACKEND=y

# 设置 Shell 提示符，你在串口看到的就会是 my_board:~$
CONFIG_SHELL_PROMPT_UART="zephyr:~$ "

# 启用 HEX 文件输出，解决 west flash --runner openocd 的报错
CONFIG_BUILD_OUTPUT_HEX=y

#
# Core Drivers: Serial/UART (核心驱动：串行/UART)
#
# 启用串行子系统
CONFIG_SERIAL=y

# 启用浮点支持，以便在日志中打印浮点数
CONFIG_CBPRINTF_FP_SUPPORT=y

#
# 启用 SPI RAM 支持
# 
# 1. 开启外部 RAM 总支持
CONFIG_ESP_SPIRAM=y
# 2. 必须指定是八线(Octal)模式（16MB 型号通常是 Octal 1.8V）
CONFIG_SPIRAM_MODE_OCT=y
# 3. 设置速度（80MHz 是常见的安全选择，160MHz 可能不稳定）
CONFIG_SPIRAM_SPEED_80M=y
# 3. 设置容量 (16MB = 16777216 字节)
CONFIG_ESP_SPIRAM_SIZE=16777216
# 4. 将 SPI RAM 用作系统内存的一部分（启用后，malloc 等函数可以使用 SPI RAM）
CONFIG_ESP_SPIRAM_HEAP_SIZE=8388608
# 6. 可选：启动时进行内存测试，确保硬件连接没问题
CONFIG_ESP_SPIRAM_MEMTEST=y

#
# Core Drivers: GPIO (通用输入/输出)
#
# 启用 GPIO 核心支持
CONFIG_GPIO=y

#
# Core Drivers: I2C
#
# 启用 I2C 核心支持
# CONFIG_I2C=y
# 开启软件模拟 I2C 驱动
# CONFIG_I2C_GPIO=y

#
# Core Drivers: Standard SPI
#
# 启用标准 SPI 核心支持 (如果需要连接 SPI 传感器/屏幕)
# CONFIG_SPI=y


#
# Core Drivers: RTC (实时时钟)
#
# 启用 RTC 核心支持
# CONFIG_RTC=y
# 启用 STM32 硬件 RTC 驱动
# CONFIG_RTC_STM32=y
# 启用 RTC 闹钟功能
# CONFIG_RTC_ALARM=y

#
# Core Drivers: LED (发光二极管)
#
# 启用 LED 核心驱动框架
# CONFIG_LED=y
CONFIG_LED_STRIP=y
# 开启 SPI 模式的 WS2812 驱动
# CONFIG_WS2812_STRIP_SPI=y
# 关键：开启 LED Strip 的详细调试日志
CONFIG_LED_STRIP_LOG_LEVEL_DBG=y

# 启用蓝牙子系统
CONFIG_BT=y
# 启用安全管理协议
CONFIG_BT_SMP=y
# 配置为蓝牙广播角色
CONFIG_BT_BROADCASTER=y
# 配置为蓝牙外设角色
CONFIG_BT_PERIPHERAL=y
# 启用隐私功能
CONFIG_BT_PRIVACY=y

# 蓝牙设备名称
CONFIG_BT_DEVICE_NAME="ESP32S3_BLE"
# 允许动态修改名称
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
# 动态名称最大长度（设置为纯数字）
CONFIG_BT_DEVICE_NAME_MAX=64
# 设备外观（833代表心率计）
CONFIG_BT_DEVICE_APPEARANCE=833

# 基础 GATT 服务
CONFIG_BT_DIS=y
CONFIG_BT_BAS=y
CONFIG_BT_HRS=y
CONFIG_BT_IAS=y
CONFIG_BT_CTS=y
CONFIG_BT_CTS_HELPER_API=y

# 启用 Zephyr 的 NUS（Nordic UART Service）蓝牙服务
CONFIG_BT_ZEPHYR_NUS=y

# 将 Host 层的连接发送上下文数量从默认值改为 12
CONFIG_BT_CONN_TX_MAX=12
# 建议同时将 ACL 缓存数量也对齐
CONFIG_BT_BUF_ACL_TX_COUNT=12

# 系统配置
# 增加工作队列栈大小（设置为纯数字）
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Core dump 是在程序崩溃时保留的内存快照
# CONFIG_DEBUG_COREDUMP=y  
# CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y 
