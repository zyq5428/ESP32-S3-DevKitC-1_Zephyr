#
# Kernel & System (内核与系统基础)
#
# 定义系统时钟滴答的频率
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
# 详细注释：v4.4.0 推荐使用 picolibc 以获得更小的 Flash 占用
CONFIG_PICOLIBC=y
# LVGL初始化或文件系统操作会复用main stack，因此需要增加 main stack size
CONFIG_MAIN_STACK_SIZE=6144
# 开启 Zephyr 的输入子系统
CONFIG_INPUT=y
# 初始化任务栈（用特定字节填充，用于监测栈使用量）
CONFIG_INIT_STACKS=y

#
# ==========================================================
# 第一部分：Console (控制台) - 解决“信息从哪发出来”
# ==========================================================
# 启用控制台基础功能
CONFIG_CONSOLE=y
# 启用早期控制台支持（内核启动初期的日志输出）
CONFIG_EARLY_CONSOLE=y

# 【关键点】必须为 y！
# 它是内核启动早期（Shell还没启动时）打印 Zephyr 版本信息的唯一通道。
# 如果设为 n，你将看不到 "*** Booting Zephyr OS ***" 这一行。
CONFIG_UART_CONSOLE=y

# 允许 printk 函数将信息发送到控制台
CONFIG_STDOUT_CONSOLE=y

# ==========================================================
# 第二部分：Logging (日志) - 解决“系统发生了什么”
# ==========================================================
# 启用日志系统
CONFIG_LOG=y

# 设置日志的显示模式
# 由于我们要用 Shell 来显示日志，所以禁用掉原始的 UART 直接输出模式，
# 防止日志和 Shell 的字符在屏幕上打架（乱码）。
CONFIG_LOG_BACKEND_UART=n

# 允许 printk 输出的信息也被当作日志处理
CONFIG_LOG_PRINTK=y

# 日志级别设置（4 是最高级别 INFO，能看到大部分信息）
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LOG_DEFAULT_LEVEL=3

# ==========================================================
# 第三部分：Shell (外壳) - 解决“如何与开发板交互”
# ==========================================================
# 启用 Shell 功能
CONFIG_SHELL=y
CONFIG_SHELL_BACKENDS=y

# Shell 命令行线程栈大小
CONFIG_SHELL_STACK_SIZE=6144

# 启用串口作为 Shell 的后端（让你可以通过串口助手输入命令）
CONFIG_SHELL_BACKEND_SERIAL=y

# 启用 Shell 的日志后端
# 作用：让 Shell 接管 Log 系统的输出。
# 开启后，当系统产生日志时，Shell 会整齐地把它打印出来，
# 并且不会打断你正在输入的命令行（它会自动处理换行和光标）。
CONFIG_SHELL_LOG_BACKEND=y

# 设置 Shell 提示符，你在串口看到的就会是 my_board:~$
CONFIG_SHELL_PROMPT_UART="zephyr:~$ "

# 启用 HEX 文件输出，解决 west flash --runner openocd 的报错
CONFIG_BUILD_OUTPUT_HEX=y

#
# Core Drivers: Serial/UART (核心驱动：串行/UART)
#
# 启用串行子系统
CONFIG_SERIAL=y

# 启用浮点支持，以便在日志中打印浮点数
CONFIG_CBPRINTF_FP_SUPPORT=y

#
# 启用 SPI RAM 支持
# 
# 1. 开启外部 RAM 总支持
CONFIG_ESP_SPIRAM=y
# 2. 必须指定是八线(Octal)模式（16MB 型号通常是 Octal 1.8V）
CONFIG_SPIRAM_MODE_OCT=y
# 3. 设置速度（80MHz 是常见的安全选择，160MHz 可能不稳定）
CONFIG_SPIRAM_SPEED_80M=y
# 3. 设置容量 (16MB = 16777216 字节)
# CONFIG_ESP_SPIRAM_SIZE=16777216
# 4. 将 SPI RAM 用作系统内存的一部分（启用后，malloc 等函数可以使用 SPI RAM）
# CONFIG_ESP_SPIRAM_HEAP_SIZE=8388608
# 6. 可选：启动时进行内存测试，确保硬件连接没问题
# CONFIG_ESP_SPIRAM_MEMTEST=y

# 开启堆内存运行时状态统计功能（不开启的话，sys_heap_runtime_stats_get 会无法获取数据）
CONFIG_SYS_HEAP_RUNTIME_STATS=y

# 
# MCUboot 核心引导配置
# 
# 告诉 Zephyr 内核：当前应用程序是运行在 MCUboot 引导程序之上的
# 开启后，系统会自动处理好固件在 Flash 中的地址偏移（例如自动偏移到 0x20000）
# CONFIG_BOOTLOADER_MCUBOOT=y

# 
# 底层 Flash 驱动与存储支持（固件管理器的依赖项）
# 
# 开启物理 Flash 的底层驱动支持
CONFIG_FLASH=y
# 开启 Flash 的页布局（Page Layout）支持，以便系统能按块擦写 Flash
CONFIG_FLASH_PAGE_LAYOUT=y
# 开启流式 Flash 写入驱动（重要！用来彻底解决之前 STREAM_FLASH=n 导致的警告）
CONFIG_STREAM_FLASH=y
# 开启 Flash 地图映射管理，用于精准识别存储分区（Slot 0 / Slot 1）
CONFIG_FLASH_MAP=y

# 
# 固件管理器与 MCUboot 运行时联动
# 
# 开启应用层的固件镜像管理器（用于读取/验证固件的版本头信息）
CONFIG_IMG_MANAGER=y
# 开启专属于 MCUboot 的镜像管理实现（解决 choice 选项悬空以及 FOOTER_SIZE 警告）
CONFIG_MCUBOOT_IMG_MANAGER=y

# 
# 关闭保守的自动检测，榨干 32MB 八线 Flash 的极限性能
# 
# 关闭自动检测（省下 900 字节 IRAM，且解锁 DTR 限制）
CONFIG_ESPTOOLPY_FLASH_MODE_AUTO_DETECT=n
# 强制开启八线Octal Flash支持
CONFIG_ESPTOOLPY_OCT_FLASH=y
# 强制开启最高速的 DTR（双倍速率）采样模式
CONFIG_ESPTOOLPY_FLASH_SAMPLE_MODE_DTR=y
# 强制指定 Flash 大小为 32MB
CONFIG_ESPTOOLPY_FLASHSIZE_32MB=y

#
# Core Drivers: DMA (直接内存访问)
#
# 启用 DMA 核心支持
CONFIG_DMA=y

#
# Core Drivers: GPIO (通用输入/输出)
#
# 启用 GPIO 核心支持
CONFIG_GPIO=y

#
# Core Drivers: I2C
#
# 启用 I2C 核心支持
# CONFIG_I2C=y
# 开启软件模拟 I2C 驱动
# CONFIG_I2C_GPIO=y

#
# Core Drivers: Standard SPI
#
# 启用标准 SPI 核心支持 (如果需要连接 SPI 传感器/屏幕)
CONFIG_SPI=y
# 注意: SPI2 DMA (GDMA) 已在 overlay 中关闭 — 开启后导致黑屏+串口失效
# 原因可能是 GDMA 通道与 I2S0(Ch3) 的仲裁冲突, 或 PSRAM→GDMA→SPI2 路径问题
# 当前使用 CPU PIO 模式 (逐字节推 FIFO), 稳定性优先, 性能可通过 flush_thread 补偿
# CONFIG_SPI_ESP32_INTERRUPT=y

#
# Core Drivers: I2S (集成音频接口)
#
# I2S 用于 WS2812 LED strip 波形生成 (通过 worldsemi,ws2812-i2s 驱动)
CONFIG_I2S=y

#
# Core Drivers: PWM (脉宽调制)
#
CONFIG_PWM=y

#
# Core Drivers: RTC (实时时钟)
#
# 启用 RTC 核心支持
# CONFIG_RTC=y
# 启用 RTC 闹钟功能
# CONFIG_RTC_ALARM=y

#
# Core Drivers: LED (发光二极管)
#
# 启用 LED 核心驱动框架
# CONFIG_LED=y
CONFIG_LED_STRIP=y

# ==========================================================
# Core Drivers: Bluetooth (蓝牙)
# ==========================================================
# 启用蓝牙子系统
CONFIG_BT=y
# 启用安全管理协议
CONFIG_BT_SMP=y
# 配置为蓝牙广播角色
CONFIG_BT_BROADCASTER=y
# 配置为蓝牙外设角色
CONFIG_BT_PERIPHERAL=y
# 启用隐私功能
CONFIG_BT_PRIVACY=y

# 蓝牙设备名称
CONFIG_BT_DEVICE_NAME="ESP32S3_BLE"
# 允许动态修改名称
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
# 动态名称最大长度（设置为纯数字）
CONFIG_BT_DEVICE_NAME_MAX=64
# 设备外观（833代表心率计）
CONFIG_BT_DEVICE_APPEARANCE=833

# 基础 GATT 服务
CONFIG_BT_DIS=y
CONFIG_BT_BAS=y
CONFIG_BT_HRS=y
CONFIG_BT_IAS=y
CONFIG_BT_CTS=y
CONFIG_BT_CTS_HELPER_API=y

# 启用 Zephyr 的 NUS（Nordic UART Service）蓝牙服务
CONFIG_BT_ZEPHYR_NUS=y

# 将 Host 层的连接发送上下文数量从默认值改为 12
CONFIG_BT_CONN_TX_MAX=12
# 建议同时将 ACL 缓存数量也对齐
CONFIG_BT_BUF_ACL_TX_COUNT=12

# 系统配置
# 增加工作队列栈大小（设置为纯数字）
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# ==========================================================
# Core Drivers: NET (网络协议栈)
# ==========================================================
# 启用NET子系统

# 开启 Zephyr 核心网络通用协议栈支持
CONFIG_NETWORKING=y
# 开启测试用随机数生成器
CONFIG_TEST_RANDOM_GENERATOR=y

# 网络发送线程栈大小 (2048 字节)
CONFIG_NET_TX_STACK_SIZE=2048
# 网络接收线程栈大小 (2048 字节)
CONFIG_NET_RX_STACK_SIZE=2048

# 接收网络包结构体的最大数量
CONFIG_NET_PKT_RX_COUNT=10
# 发送网络包结构体的最大数量
CONFIG_NET_PKT_TX_COUNT=10
# 接收网络缓冲区的最大数量
CONFIG_NET_BUF_RX_COUNT=20
# 发送网络缓冲区的最大数量
CONFIG_NET_BUF_TX_COUNT=20
# 系统允许同时打开的最大网络上下文（套接字）数量
CONFIG_NET_MAX_CONTEXTS=10

# 开启 IPv4 协议支持（我们上网主力）
CONFIG_NET_IPV4=y
# 关闭 IPv6 协议支持（节省大量 RAM 空间！）
CONFIG_NET_IPV6=n
# 开启 TCP 传输层协议（用于后续 HTTP/MQTT）
CONFIG_NET_TCP=y
# 开启 DHCPv4 客户端（连接路由器后自动向其申请 IP）
CONFIG_NET_DHCPV4=y

# 开启网络 Shell 指令支持（如支持输入 net iface, net ping 等）
CONFIG_NET_SHELL=y
# 开启网络栈的内部日志输出输出
CONFIG_NET_LOG=y
# 开启网络流量统计统计（记录发了多少包，丢了多少包）
CONFIG_NET_STATISTICS=y
# 关闭定时自动在屏幕上打印统计报告
CONFIG_NET_STATISTICS_PERIODIC_OUTPUT=n

# 在新的锁设计中，向串口打印大量的扫描结果（WiFi Scan）会给系统的事件队列造成巨大的时间压力。
# 所以，在周围路由器非常密集的拥挤环境中，需要使用更高的超时时间和更大的队列深度。
# 事件队列超时时间放宽到 5000 毫秒
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000
# 事件队列深度扩大到 16
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16

# 开启动态域名解析功能（DNS Resolver）
CONFIG_DNS_RESOLVER=y
# 允许系统最多同时保存2个DNS服务器（一个主，一个备）
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
# 允许通过 DHCP 自动从路由器获取 DNS 服务器的 IP地址
CONFIG_DNS_SERVER_IP_ADDRESSES=y

# ==========================================================
# Core Drivers: Wifi
# ==========================================================
# 启用Wifi子系统

# 开启底层 Wi-Fi 硬件驱动支持
CONFIG_WIFI=y
# 设置 Wi-Fi 日志级别为错误（只显示错误信息，减少日志干扰）
CONFIG_WIFI_LOG_LEVEL_ERR=y
# 启用 Wi-Fi Shell 命令，允许通过 Shell 交互式管理 Wi-Fi 连接（扫描、连接、状态查询等）
CONFIG_NET_L2_WIFI_SHELL=y

# ==========================================================
# Core Drivers: SNTP (简单网络时间协议)
# ==========================================================
# 启用 SNTP 客户端库（用于从 NTP 服务器获取精确的网络时间）
# SNTP 的超时时间在 C 代码中通过 sntp_ctx_obj.timeout 动态设置
CONFIG_SNTP=y

# ==========================================================
# Core Drivers: Socket DNS (增强 DNS 查询能力)
# ==========================================================
# 增加额外 DNS 查询次数 (类型为 int，取值 0~2)
# 当 DNS 响应只包含 CNAME 时，允许解析器额外发起查询以获取最终 A 记录
CONFIG_DNS_RESOLVER_ADDITIONAL_QUERIES=2

# ==========================================================
# Core Libraries: JSON (轻量级 JSON 解析库)
# ==========================================================
# 启用 Zephyr 内置 JSON 解析库（用于解析天气 API 返回的 JSON 响应）
CONFIG_JSON_LIBRARY=y

# Core dump 是在程序崩溃时保留的内存快照
# CONFIG_DEBUG_COREDUMP=y
# CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y

#
# ==========================================================
# LCD & LVGL (液晶显示屏 + 图形界面)
# ==========================================================
# 启用显示子系统
CONFIG_DISPLAY=y
# 启用 MIPI DBI 模式 C (SPI 模拟) — 自动被 ST7789V 驱动选中
CONFIG_MIPI_DBI=y

# 启用 LVGL 图形库
CONFIG_LVGL=y
# 颜色深度使用 16 位 RGB565 (匹配 ST7789V 硬件格式)
CONFIG_LV_COLOR_DEPTH_16=y
# 启用 LVGL 内部日志
CONFIG_LV_USE_LOG=y
# LVGL 内存池大小 (从系统堆分配，用于 LVGL 内部对象管理)
# Widgets Demo 至少需要 38KB (编译器内置检查: LV_MEM_SIZE < 38KB 报错)
# 设为 48KB 留出安全余量, 内存池放在 PSRAM (CONFIG_LV_Z_MEMORY_POOL_CUSTOM_SECTION=y)
CONFIG_LV_Z_MEM_POOL_SIZE=65536
# ===== LVGL 渲染缓冲区 (性能关键) =====
# 渲染缓冲区 = 屏幕总像素的 100% (全帧缓冲)
# 240×280×2 字节 = 131KB 单缓冲, 262KB 双缓冲
# 放入 PSRAM (16MB) — 完全不占用宝贵的内部 SRAM
CONFIG_LV_Z_VDB_SIZE=100
# 双缓冲: LVGL 渲染到 buf0 的同时, SPI 从 buf1 刷屏
# 消除画面撕裂 (tearing), 是视觉流畅度的最大提升项
CONFIG_LV_Z_DOUBLE_VDB=y
# 缓冲区从静态数组分配 (编译时决定)
CONFIG_LV_Z_BUFFER_ALLOC_STATIC=y
# ★★★ 关键: 将渲染缓冲区放入 PSRAM ★★★
# ESP32-S3 default.ld 第 1049 行已内置: KEEP(*(.lvgl_buf*))
# 开启后 __attribute__((section(".lvgl_buf"))) → 链接器自动放入 ext_dram_seg
CONFIG_LV_Z_VDB_CUSTOM_SECTION=y
# ★★★ 关键: 将 LVGL 内存池放入 PSRAM ★★★
# ESP32-S3 default.ld 第 1051 行已内置: KEEP(*(.lvgl_heap*))
CONFIG_LV_Z_MEMORY_POOL_CUSTOM_SECTION=y
# 在应用启动前自动初始化 LVGL 库
CONFIG_LV_Z_AUTO_INIT=y

# ===== LVGL 独立渲染工作队列 (性能关键) =====
# 开启后 LVGL 在专用高优先级线程中运行 lv_timer_handler(),
# 应用线程不再需要手动调用, 且不会被低优先级任务阻塞
CONFIG_LV_Z_RUN_LVGL_ON_WORKQUEUE=y
# 工作队列优先级: 5 (高于大部分应用线程, 保证 UI 流畅)
CONFIG_LV_Z_LVGL_WORKQUEUE_PRIORITY=5
# 工作队列栈大小: 4096 (足够 LVGL 渲染使用)
CONFIG_LV_Z_LVGL_WORKQUEUE_STACK_SIZE=4096

# 启用 16 位颜色字节交换 (RGB565 格式)
# 【关键】ESP32 是小端序 (Little Endian)，而 ST7789 屏幕期望大端序 (Big Endian) 数据。
# 不开启此选项时：像素数据按 [高8位][低8位] 顺序发送，屏幕端解析颠倒 →
#                 现象：屏幕能显示图像，但颜色完全错误（红蓝颠倒、花屏、杂色）
# 开启此选项后：LVGL 在发送前自动交换每 2 字节的高低顺序 →
#                 发送 [低8位][高8位]，屏幕正确解析为 RGB565
# 总结：只要 SPI 屏颜色不对，第一个检查的就是这个选项！
CONFIG_LV_COLOR_16_SWAP=y

# ===== LVGL Widgets (按需启用，节约 Flash) =====
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BUTTON=y
CONFIG_LV_USE_IMAGE=y
CONFIG_LV_USE_CANVAS=y
CONFIG_LV_FONT_MONTSERRAT_14=y
# Widgets Demo 界面使用多种字号 (标题/正文/图表标注)
# Montserrat 字体族: 12=小字标签, 16=正文字号, 18/20=标题, 24=大标题
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_24=y

# [赛博朋克时钟] 48号巨字时间 + 28号温度数字
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_FONT_MONTSERRAT_48=y

# [已替换] 改用自定义 weather_chinese_font (src/fonts/weather_chinese_font.c)
# CONFIG_LV_FONT_SOURCE_HAN_SANS_SC_16_CJK=y

# ===== LVGL 官方 Demo 构建 =====
# LV_BUILD_DEMOS 是编译 lv_demos.c 的门控开关 (伞形文件)
CONFIG_LV_BUILD_DEMOS=y
# Widgets Demo: 4 个 Tab 页 (Shop/Analytics/Profile/Components)
# 自动 8 秒轮播切换, 是 LVGL 9 自带的视觉最丰富的官方 Demo
CONFIG_LV_USE_DEMO_WIDGETS=y
# 系统监控: 为 perf monitor 提供真实 CPU 空闲率数据
# 如果不启用, perf monitor 会回退到测量 lv_timer_handler 耗时来估算 CPU
CONFIG_LV_USE_SYSMON=y
# [已关闭] 右下角 FPS/CPU 性能监视器 (赛博朋克时钟不需要)
# CONFIG_LV_USE_PERF_MONITOR=y
# 刷新周期: 默认 33ms(30FPS) → 10ms(100FPS) 解除帧率软上限
CONFIG_LV_DEF_REFR_PERIOD=10
# 独立刷新线程: 渲染和 SPI 刷屏并行, 消除等待
CONFIG_LV_Z_FLUSH_THREAD=y
